name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Unit Testing
  # ─────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml

  # ─────────────────────────────────────────
  # JOB 2: Deploy ke VPS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record deployment start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            APP_DIR="/var/www/flask-cd-project"
            REPO_URL="https://github.com/BaldGuy679/flask-cd-project-final.git"

            echo "=== [1/5] Memastikan direktori & repo tersedia ==="
            # Buat direktori jika belum ada
            if [ ! -d "$APP_DIR" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown $USER:$USER "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Clone jika belum ada repo, pull jika sudah ada
            if [ ! -d ".git" ]; then
              echo "Repo belum ada, cloning..."
              git clone "$REPO_URL" .
            else
              echo "Repo sudah ada, pulling..."
              git pull origin main
            fi

            echo "=== [2/5] Installing dependencies ==="
            # Buat venv jika belum ada
            if [ ! -d "venv" ]; then
              echo "Virtual env belum ada, membuat baru..."
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "=== [3/5] Running migrations ==="
            flask db upgrade 2>/dev/null || echo "No migrations to run"

            echo "=== [4/5] Restarting service ==="
            sudo systemctl restart flask-cd-project
            sudo systemctl is-active --wait flask-cd-project

            echo "=== [5/5] Health check with retry ==="
            sleep 5
            for i in {1..10}; do
              if curl -sf http://localhost:5000/api/health; then
                echo "✅ Deployment successful!"
                exit 0
              fi
              echo "Attempt $i/10 gagal, retry dalam 3s..."
              sleep 3
            done

            echo "❌ Health check gagal. Log service:"
            sudo journalctl -u flask-cd-project --no-pager -n 50
            exit 1

      - name: Calculate deployment duration
        if: always()
        run: |
          END=$(date +%s%3N)
          START=${{ steps.timer.outputs.start }}
          DURATION=$(( END - START ))
          DURATION_SEC=$(echo "scale=2; $DURATION/1000" | bc)

          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Success"
          else
            STATUS="❌ Failed"
          fi

          echo "### 🚀 Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric        | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status        | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration      | ${DURATION_SEC}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit        | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch        | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by  | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY