name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record deployment start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "=== [1/5] Pulling latest code ==="
            cd /var/www/flask-cd-project
            git pull origin main

            echo "=== [2/5] Installing dependencies ==="
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "=== [3/5] Running migrations ==="
            flask db upgrade 2>/dev/null || echo "No migrations to run"

            echo "=== [4/5] Restarting service ==="
            sudo systemctl restart flask-cd-project

            echo "=== [5/5] Health check ==="
            sleep 3
            curl -f http://localhost:5000/api/health || exit 1
            echo "Deployment successful!"

      - name: Calculate deployment duration
        if: always()
        run: |
          END=$(date +%s%3N)
          START=${{ steps.timer.outputs.start }}
          DURATION=$(( (END - START) ))
          echo "### Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
