{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap { min-height: calc(100vh - 56px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .auth-title { font-family: var(--mono); font-size: 1.4rem; color: var(--accent); margin-bottom: .4rem; }
  .auth-sub { color: var(--muted); font-size: .85rem; margin-bottom: 2rem; }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: .4rem; font-family: var(--mono); letter-spacing: .06em; }
  .field input { width: 100%; padding: .65rem .9rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: .9rem; transition: border-color .2s; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .btn-submit { width: 100%; padding: .75rem; background: var(--accent); color: #000; border: none; border-radius: 4px; font-family: var(--mono); font-size: .9rem; cursor: pointer; font-weight: 600; letter-spacing: .06em; transition: opacity .2s; }
  .btn-submit:hover { opacity: .85; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .82rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .hint { font-size: .75rem; color: var(--muted); margin-top: .3rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">$ register</div>
    <div class="auth-sub">Create a new monitoring account</div>
    <form method="POST">
      <div class="field">
        <label>USERNAME</label>
        <input type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="field">
        <label>EMAIL</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="min. 6 characters" required>
        <div class="hint">Minimum 6 characters</div>
      </div>
      <div class="field">
        <label>CONFIRM PASSWORD</label>
        <input type="password" name="confirm_password" placeholder="repeat password" required>
      </div>
      <button type="submit" class="btn-submit">CREATE ACCOUNT →</button>
    </form>
    <div class="auth-footer">
      Already registered? <a href="{{ url_for('auth.login') }}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
