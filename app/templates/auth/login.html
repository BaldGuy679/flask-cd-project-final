{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 56px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2.5rem;
    width: 100%; max-width: 400px;
  }
  .auth-title { font-family: var(--mono); font-size: 1.4rem; color: var(--accent); margin-bottom: .4rem; }
  .auth-sub { color: var(--muted); font-size: .85rem; margin-bottom: 2rem; }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: .4rem; font-family: var(--mono); letter-spacing: .06em; }
  .field input {
    width: 100%; padding: .65rem .9rem;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: .9rem;
    transition: border-color .2s;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .remember { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; }
  .remember input { width: auto; }
  .btn-submit {
    width: 100%; padding: .75rem; background: var(--accent); color: #000;
    border: none; border-radius: 4px; font-family: var(--mono); font-size: .9rem;
    cursor: pointer; font-weight: 600; letter-spacing: .06em; transition: opacity .2s;
  }
  .btn-submit:hover { opacity: .85; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .82rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">$ login</div>
    <div class="auth-sub">Access system monitoring dashboard</div>

    <form method="POST">
      <div class="field">
        <label>USERNAME</label>
        <input type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"> Remember me
      </label>
      <button type="submit" class="btn-submit">SIGN IN →</button>
    </form>

    <div class="auth-footer">
      No account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
